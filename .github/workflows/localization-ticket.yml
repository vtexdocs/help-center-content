# Localization Ticket Automation
#
# Creates a Jira ticket for the Localization team when a localization needed label is added
# to an eligible PR. The ticket includes PR details and the PR description for
# context. Parent task priority and due date are set from the label:
#   - localization needed (high)   -> High,   Friday of the following week
#   - localization needed (medium) -> Medium, one week after High
#   - localization needed (low)    -> Low,    one week after Medium
#
# Requirements (all must be met for the workflow to run):
#
#   Changed files
#     - PR includes changes under docs/pt/**/*.md, docs/pt/**/*.mdx, or
#       localization/**
#     - Changes include at least one addition (deletion-only PRs are skipped)
#
#   Trigger
#     - One of these labels is added to the PR (re-add after new commits if the
#       label was applied before pt/localization files changed):
#         localization needed (high) | (medium) | (low)
#     - PR targets the main branch
#
#   Exclusions
#     - PRs including the "localization" label are skipped
#     - PRs with a source branch starting with "l10n" are skipped (e.g. l10n_, l10n/, l10n-)
#
# Dedupe
#   - Reuses an existing parent task when found via (in order):
#       1. PR comment "Localization ticket [XXX-xxxxx]"
#       2. Jira label hc-github-pr-{owner}-{repo}-{number}
#       3. Jira text search for hc-github-pr-ref: {repo}#{number} (oldest wins)
#       4. Jira fallback: [HC] summary + PR link text "#{number}" (oldest wins)
#     (Jira does not reliably index full GitHub URLs in descriptions.)
#   - New tickets receive the hc-github-pr-* label for reliable future dedupe
#   - Re-adding or changing the localization label on a PR with an existing task
#     updates the parent description, priority, due date, and subtask due dates
#   - Missing subtasks are still attached; oldest matching ticket wins
#   - Subtasks are matched by summary under the parent; oldest match wins
#   - Posts a PR comment linking the parent task (updates delivery date if comment exists)
#
# After creating the parent task under the configured Education epic, the workflow
# attaches the standard eight-step localization subtask chain in this order
# (creation is sequential; rank is set afterward so Jira displays them the same way):
#   1. Prepare file to be localized (blocks all subsequent tasks),
#      due last Friday before parent due date (when that date is on or before
#      creation day, use Monday of the following week instead).
#   2. English translation (blocks subsequent English tasks),
#      due last Tuesday before parent due
#   3. English revision (blocks subsequent English tasks),
#      due last Thursday before parent due
#   4. English implementation, due the same day as parent due date.
#   5. Spanish translation (blocks subsequent Spanish tasks),
#      due last Tuesday before parent due.
#   6. Spanish revision (blocks subsequent Spanish tasks),
#      due last Thursday before parent due.
#   7. Spanish implementation, due the same day as parent due date.
#   8. Create PR (is blocked by all previous subtasks),
#      due the same day as parent due date.
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#
#   LOC_JIRA_BASE_URL    - Jira instance URL
#   LOC_JIRA_USER_EMAIL  - Atlassian account email (personal account is fine)
#   LOC_JIRA_API_TOKEN   - API token for that account (https://id.atlassian.com)
#   LOC_JIRA_PROJECT_KEY - Jira project key
#   LOC_JIRA_EPIC_KEY    - Parent epic key for Help Center tasks
#
# Optional Crowdin + Jira custom fields (when set, touched files are uploaded
# directly to the Crowdin project via API (no Git sync, no per-PR branches).
# When fewer than half of a file's lines were added in no more than three
# consecutive blocks, only those added lines are uploaded as {name}.partial.md.
# All Crowdin files are flat names prefixed with the Jira task key.
# Word count is written to the parent task (LOC_JIRA_WORD_COUNT_FIELD) and EN/ES
# editor links are added to all English/Spanish subtask descriptions.
#
#   LOC_CROWDIN_API_TOKEN              - Crowdin personal access token (crowdin.com)
#   LOC_CROWDIN_PROJECT_ID             - Crowdin project numeric ID

name: Create Localization Ticket

# LOC / Crowdin configuration (edit here if needed).
env:
  LOC_JIRA_WORD_COUNT_FIELD: customfield_10253
  CROWDIN_EN_LANGUAGE: en
  CROWDIN_ES_LANGUAGE: es-mx

on:
  pull_request:
    types: [labeled]
    branches: [main]
    paths:
      - 'docs/pt/**/*.md'
      - 'docs/pt/**/*.mdx'
      - 'localization/**'

jobs:
  create-jira-ticket:
    if: >
      (github.event.label.name == 'localization needed (high)' ||
       github.event.label.name == 'localization needed (medium)' ||
       github.event.label.name == 'localization needed (low)') &&
      !contains(github.event.pull_request.labels.*.name, 'localization') &&
      !startsWith(github.event.pull_request.head.ref, 'l10n')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check for content additions
        id: content_diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          INSERTIONS=$(git diff --numstat \
            "$BASE_SHA" \
            "$HEAD_SHA" \
            -- docs/pt/ localization/ \
            | awk '{sum += $1} END {print sum+0}')

          if [ "$INSERTIONS" -gt 0 ]; then
            echo "has_additions=true" >> $GITHUB_OUTPUT
          else
            echo "has_additions=false" >> $GITHUB_OUTPUT
          fi

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRD \
            "$BASE_SHA" \
            "$HEAD_SHA" \
            -- docs/pt/ localization/ \
            | grep -E '\.(md|mdx)$' \
            | sort || true)

          {
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Resolve or create Jira ticket
        id: parent_ticket
        if: steps.content_diff.outputs.has_additions == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LOC_JIRA_BASE_URL: ${{ secrets.LOC_JIRA_BASE_URL }}
          LOC_JIRA_USER_EMAIL: ${{ secrets.LOC_JIRA_USER_EMAIL }}
          LOC_JIRA_API_TOKEN: ${{ secrets.LOC_JIRA_API_TOKEN }}
          LOC_JIRA_PROJECT_KEY: ${{ secrets.LOC_JIRA_PROJECT_KEY }}
          LOC_JIRA_EPIC_KEY: ${{ secrets.LOC_JIRA_EPIC_KEY }}
          CHANGED_FILES: ${{ steps.content_diff.outputs.changed_files }}
        run: |
          PR_NUMBER=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
          PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
          PR_URL=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")
          PR_AUTHOR=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")
          PR_BODY_RAW=$(jq -r '.pull_request.body // "No description provided."' "$GITHUB_EVENT_PATH")
          GITHUB_REPOSITORY=$(jq -r '.repository.full_name' "$GITHUB_EVENT_PATH")
          PR_REF="${GITHUB_REPOSITORY}#${PR_NUMBER}"
          PR_LABEL="hc-github-pr-$(echo "${GITHUB_REPOSITORY}" | tr '/' '-')-${PR_NUMBER}"
          LABEL=$(jq -r '.label.name' "$GITHUB_EVENT_PATH")

          jira_post_search() {
            local jql="$1"
            local fields_csv="$2"
            local max_results="${3:-50}"
            local payload response http_code body api_url

            payload=$(jq -n \
              --arg jql "$jql" \
              --arg fields "$fields_csv" \
              --argjson max "$max_results" \
              '{
                jql: $jql,
                maxResults: $max,
                fields: ($fields | split(",") | map(gsub("^\\s+|\\s+$"; "")))
              }')

            for api_url in \
              "${LOC_JIRA_BASE_URL}/rest/api/3/search/jql" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/search"; do
              response=$(curl -s -w "\n%{http_code}" \
                -X POST \
                -H "Content-Type: application/json" \
                -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
                -d "$payload" \
                "$api_url")
              http_code=$(echo "$response" | tail -1)
              body=$(echo "$response" | sed '$d')

              if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
                if [ "$(echo "$body" | jq -r '.errorMessages // [] | length')" -gt 0 ]; then
                  echo "Jira search error: $(echo "$body" | jq -r '.errorMessages[]')" >&2
                  return 1
                fi
                echo "$body"
                return 0
              fi

              if [ "$http_code" != "404" ] && [ "$http_code" != "405" ]; then
                echo "Jira search failed at ${api_url} (HTTP ${http_code}): ${body}" >&2
                return 1
              fi
            done

            echo "Jira search failed: no compatible search endpoint" >&2
            return 1
          }

          jira_search_first_key() {
            local jql="$1"
            local result
            result=$(jira_post_search "$jql" "key,created" 1) || return 1
            echo "$result" | jq -r '.issues[0].key // empty'
          }

          resolve_existing_parent_key() {
            local key source

            key=$(gh api \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --paginate \
              | jq -r --arg project "$LOC_JIRA_PROJECT_KEY" \
                '[.[] | select(.body | test("Localization ticket \\[" + $project + "-[0-9]+\\]"))] | sort_by(.created_at) | .[0].body // empty' \
              | grep -oE "${LOC_JIRA_PROJECT_KEY}-[0-9]+" | head -1 || true)
            if [ -n "$key" ]; then
              source="PR comment"
            else
              key=$(jira_search_first_key \
                "project = ${LOC_JIRA_PROJECT_KEY} AND labels = \"${PR_LABEL}\" ORDER BY created ASC" || true)
              if [ -n "$key" ]; then
                source="hc-github-pr label"
              else
                key=$(jira_search_first_key \
                  "project = ${LOC_JIRA_PROJECT_KEY} AND text ~ \"hc-github-pr-ref: ${PR_REF}\" ORDER BY created ASC" || true)
                if [ -n "$key" ]; then
                  source="hc-github-pr-ref marker"
                else
                  key=$(jira_search_first_key \
                    "project = ${LOC_JIRA_PROJECT_KEY} AND summary ~ \"\\\\[HC\\\\]\" AND text ~ \"#${PR_NUMBER}\" ORDER BY created ASC" || true)
                  if [ -n "$key" ]; then
                    source="[HC] summary and PR link text"
                  fi
                fi
              fi
            fi

            if [ -n "$key" ]; then
              echo "Found existing ticket via ${source}: ${key}" >&2
              echo "$key"
            fi
          }

          case "$LABEL" in
            "localization needed (high)")
              JIRA_PRIORITY="High"
              ;;
            "localization needed (medium)")
              JIRA_PRIORITY="Medium"
              ;;
            "localization needed (low)")
              JIRA_PRIORITY="Low"
              ;;
            *)
              echo "Unexpected label: ${LABEL}" >&2
              exit 1
              ;;
          esac

          case "$JIRA_PRIORITY" in
            High)   EXTRA_WEEKS=0 ;;
            Medium) EXTRA_WEEKS=1 ;;
            Low)    EXTRA_WEEKS=2 ;;
          esac

          TODAY=$(date -u +%Y-%m-%d)
          DOW=$(date -u +%u)
          DAYS_TO_FOLLOWING_MONDAY=$(( (8 - DOW) % 7 ))
          if [ "$DAYS_TO_FOLLOWING_MONDAY" -eq 0 ]; then
            DAYS_TO_FOLLOWING_MONDAY=7
          fi
          DAYS_TO_DUE=$((DAYS_TO_FOLLOWING_MONDAY + 4 + EXTRA_WEEKS * 7))
          JIRA_DUE_DATE=$(date -u -d "${TODAY} + ${DAYS_TO_DUE} days" +%Y-%m-%d)

          PR_BODY=$(echo "$PR_BODY_RAW" | sed \
            -e 's/^#### /h4. /' \
            -e 's/^### /h3. /' \
            -e 's/^## /h2. /' \
            -e 's/^# /h1. /' \
            -e 's/^- /* /' \
            -e 's/`\([^`]*\)`/{{\1}}/g' \
            -e 's/!\[.*\](\([^)]*\))/!\1!/g' \
            -e 's/<img[^>]*src="\([^"]*\)"[^>]*>/!\1!/g')

          if [ -n "$CHANGED_FILES" ]; then
            CHANGED_FILES_SECTION=$(printf '%s\n' "$CHANGED_FILES" | sed 's/^/* /')
          else
            CHANGED_FILES_SECTION="* No MD/MDX files changed"
          fi

          update_parent_issue() {
            local key="$1"
            local labels_json payload response

            labels_json=$(curl -s \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}?fields=labels" \
              | jq -c --arg label "$PR_LABEL" \
                '[.fields.labels[]?.name] | if index($label) then . else . + [$label] end | map({name: .})')

            payload=$(jq -n \
              --arg summary "[HC] ${PR_TITLE}" \
              --arg pr_ref "$PR_REF" \
              --arg pr_author "$PR_AUTHOR" \
              --arg pr_number "$PR_NUMBER" \
              --arg pr_url "$PR_URL" \
              --arg changed_files "$CHANGED_FILES_SECTION" \
              --arg pr_body "$PR_BODY" \
              --arg priority "$JIRA_PRIORITY" \
              --arg duedate "$JIRA_DUE_DATE" \
              --argjson labels "$labels_json" \
              '{
                fields: {
                  summary: $summary,
                  description: (
                    "hc-github-pr-ref: " + $pr_ref + "\n\n" +
                    "h3. PR Details\n" +
                    "||Field||Value||\n" +
                    "|Author|" + $pr_author + "|\n" +
                    "|PR|[#" + $pr_number + "|" + $pr_url + "]|\n\n" +
                    "h3. Changed files\n\n" +
                    $changed_files + "\n\n" +
                    "h3. PR Description\n\n" +
                    $pr_body
                  ),
                  priority: { name: $priority },
                  duedate: $duedate,
                  labels: $labels
                }
              }')

            response=$(curl -s -o update-response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
              -d "$payload" \
              "${LOC_JIRA_BASE_URL}/rest/api/2/issue/${key}")

            if [ "$response" -eq 204 ] || [ "$response" -eq 200 ]; then
              echo "Updated ticket: ${LOC_JIRA_BASE_URL}/browse/${key} (priority: ${JIRA_PRIORITY}, due: ${JIRA_DUE_DATE})"
            else
              echo "Failed to update ticket ${key} (HTTP ${response})" >&2
              cat update-response.json >&2
              exit 1
            fi
          }

          EXISTING_KEY=$(resolve_existing_parent_key || true)
          if [ -n "$EXISTING_KEY" ]; then
            update_parent_issue "$EXISTING_KEY"
            echo "parent_key=${EXISTING_KEY}" >> "$GITHUB_OUTPUT"
            echo "parent_due_date=${JIRA_DUE_DATE}" >> "$GITHUB_OUTPUT"
            echo "Using existing ticket: ${LOC_JIRA_BASE_URL}/browse/${EXISTING_KEY}"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg project "$LOC_JIRA_PROJECT_KEY" \
            --arg epic_key "$LOC_JIRA_EPIC_KEY" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg pr_ref "$PR_REF" \
            --arg pr_label "$PR_LABEL" \
            --arg pr_author "$PR_AUTHOR" \
            --arg pr_body "$PR_BODY" \
            --arg changed_files "$CHANGED_FILES_SECTION" \
            --arg priority "$JIRA_PRIORITY" \
            --arg duedate "$JIRA_DUE_DATE" \
            '{
              fields: {
                project: { key: $project },
                parent: { key: $epic_key },
                summary: ("[HC] " + $pr_title),
                description: (
                  "hc-github-pr-ref: " + $pr_ref + "\n\n" +
                  "h3. PR Details\n" +
                  "||Field||Value||\n" +
                  "|Author|" + $pr_author + "|\n" +
                  "|PR|[#" + $pr_number + "|" + $pr_url + "]|\n\n" +
                  "h3. Changed files\n\n" +
                  $changed_files + "\n\n" +
                  "h3. PR Description\n\n" +
                  $pr_body
                ),
                issuetype: { name: "Task" },
                priority: { name: $priority },
                duedate: $duedate,
                labels: [$pr_label]
              }
            }')

          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -u "${LOC_JIRA_USER_EMAIL}:${LOC_JIRA_API_TOKEN}" \
            -d "$PAYLOAD" \
            "${LOC_JIRA_BASE_URL}/rest/api/2/issue")

          if [ "$RESPONSE" -eq 201 ]; then
            TICKET=$(jq -r '.key' response.json)
            echo "parent_key=${TICKET}" >> "$GITHUB_OUTPUT"
            echo "parent_due_date=${JIRA_DUE_DATE}" >> "$GITHUB_OUTPUT"
            echo "Ticket created: ${LOC_JIRA_BASE_URL}/browse/${TICKET} (epic: ${LOC_JIRA_EPIC_KEY}, priority: ${JIRA_PRIORITY}, due: ${JIRA_DUE_DATE})"
          else
            echo "Failed to create ticket (HTTP $RESPONSE)"
            cat response.json
            exit 1
          fi

      - name: Upload touched files to Crowdin
        id: crowdin_upload
        if: >-
          steps.content_diff.outputs.has_additions == 'true' &&
          steps.parent_ticket.outputs.parent_key != ''
        env:
          LOC_CROWDIN_API_TOKEN: ${{ secrets.LOC_CROWDIN_API_TOKEN }}
          LOC_CROWDIN_PROJECT_ID: ${{ secrets.LOC_CROWDIN_PROJECT_ID }}
          CHANGED_FILES: ${{ steps.content_diff.outputs.changed_files }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          JIRA_TASK_KEY: ${{ steps.parent_ticket.outputs.parent_key }}
        run: |
          python3 <<'PYTHON'
import json
import os
import re
import subprocess
import sys
import time
import urllib.error
import urllib.parse
import urllib.request
from dataclasses import dataclass
from pathlib import Path
from typing import Literal

CROWDIN_API_BASE = "https://api.crowdin.com/api/v2"
CROWDIN_WEB_BASE = "https://crowdin.com"


def env(name: str, default: str = "") -> str:
    return os.environ.get(name, default).strip()


def crowdin_request(
    method: str,
    path: str,
    *,
    data: dict | bytes | None = None,
    content_type: str = "application/json",
    extra_headers: dict | None = None,
) -> dict:
    token = env("LOC_CROWDIN_API_TOKEN")
    if not token:
        raise RuntimeError("LOC_CROWDIN_API_TOKEN is not set")

    url = f"{CROWDIN_API_BASE}{path}"
    headers = {"Authorization": f"Bearer {token}"}
    if extra_headers:
        headers.update(extra_headers)
    body = None
    if isinstance(data, dict):
        body = json.dumps(data).encode("utf-8")
        headers["Content-Type"] = content_type
    elif isinstance(data, bytes):
        body = data
        headers["Content-Type"] = content_type

    request = urllib.request.Request(url, data=body, method=method, headers=headers)
    try:
        with urllib.request.urlopen(request) as response:
            raw = response.read().decode("utf-8")
            if not raw:
                return {}
            return json.loads(raw)
    except urllib.error.HTTPError as error:
        detail = error.read().decode("utf-8", errors="replace")
        raise RuntimeError(
            f"Crowdin API {method} {path} failed (HTTP {error.code}): {detail}"
        ) from error


def upload_storage_bytes(payload: bytes, file_name: str) -> int:
    encoded_name = urllib.parse.quote(file_name, safe="")
    response = crowdin_request(
        "POST",
        "/storages",
        data=payload,
        content_type="application/octet-stream",
        extra_headers={"Crowdin-API-FileName": encoded_name},
    )
    return int(response["data"]["id"])


def default_branch_id(project_id: str) -> int | None:
    query = urllib.parse.urlencode({"limit": 500})
    response = crowdin_request("GET", f"/projects/{project_id}/branches?{query}")
    branches = response.get("data", [])
    if not branches:
        return None

    for preferred in ("main", "master"):
        for item in branches:
            if item["data"]["name"] == preferred:
                return int(item["data"]["id"])
    return int(branches[0]["data"]["id"])


def find_file(project_id: str, file_name: str, branch_id: int | None) -> int | None:
    params: dict[str, str | int] = {"filter": file_name, "limit": 500}
    if branch_id is not None:
        params["branchId"] = branch_id
    query = urllib.parse.urlencode(params)
    response = crowdin_request("GET", f"/projects/{project_id}/files?{query}")
    for item in response.get("data", []):
        if item["data"]["name"] == file_name:
            return int(item["data"]["id"])
    return None


def create_or_update_file(
    project_id: str,
    branch_id: int | None,
    storage_id: int,
    file_name: str,
    file_type: str,
) -> int:
    existing_id = find_file(project_id, file_name, branch_id)
    if existing_id is None:
        payload: dict[str, object] = {
            "storageId": storage_id,
            "name": file_name,
            "type": file_type,
        }
        if branch_id is not None:
            payload["branchId"] = branch_id
        created = crowdin_request(
            "POST",
            f"/projects/{project_id}/files",
            data=payload,
        )
        return int(created["data"]["id"])

    crowdin_request(
        "PUT",
        f"/projects/{project_id}/files/{existing_id}",
        data={"storageId": storage_id},
    )
    return existing_id


def get_file_word_count(project_id: str, file_id: int) -> int:
    for attempt in range(6):
        response = crowdin_request(
            "GET",
            f"/projects/{project_id}/files/{file_id}/languages/progress",
        )
        items = response.get("data", [])
        if items:
            return int(items[0]["data"]["words"]["total"])
        time.sleep(2 * (attempt + 1))
    return 0


def editor_url(project_id: str, file_id: int, language_id: str) -> str:
    params = urllib.parse.urlencode({"fileId": file_id, "lang": language_id})
    return f"{CROWDIN_WEB_BASE}/u/projects/{project_id}/editor?{params}"


def crowdin_basename(relative_path: str) -> str:
    return Path(relative_path.replace("\\", "/")).name


def partial_crowdin_name(file_name: str) -> str:
    path = Path(file_name)
    return f"{path.stem}.partial{path.suffix}"


def prefixed_crowdin_name(task_key: str, file_name: str) -> str:
    return f"{task_key}_{file_name}"


def is_eligible_path(relative_path: str) -> bool:
    path = relative_path.replace("\\", "/")
    return path.startswith(("docs/pt/", "localization/"))


def changed_files() -> list[str]:
    raw = env("CHANGED_FILES")
    if not raw:
        return []
    return [
        line.strip()
        for line in raw.splitlines()
        if line.strip().endswith((".md", ".mdx")) and is_eligible_path(line.strip())
    ]


def git_diff(base_sha: str, head_sha: str, relative_path: str) -> str:
    result = subprocess.run(
        ["git", "diff", "-U0", f"{base_sha}...{head_sha}", "--", relative_path],
        capture_output=True,
        text=True,
        check=False,
    )
    if result.returncode not in (0, 1):
        raise RuntimeError(
            f"git diff failed for {relative_path}: "
            f"{result.stderr.strip() or result.stdout.strip()}"
        )
    return result.stdout


def parse_added_lines(diff_text: str) -> list[tuple[int, str]]:
    additions: list[tuple[int, str]] = []
    new_line = 0

    for line in diff_text.splitlines():
        if line.startswith("@@"):
            match = re.search(r"\+(\d+)(?:,(\d+))?", line)
            if match:
                new_line = int(match.group(1))
            continue
        if line.startswith("+++") or line.startswith("---"):
            continue
        if line.startswith("+"):
            additions.append((new_line, line[1:]))
            new_line += 1
        elif line.startswith("-"):
            continue
        elif line.startswith(" "):
            new_line += 1

    return additions


def group_consecutive_blocks(additions: list[tuple[int, str]]) -> list[list[str]]:
    if not additions:
        return []

    blocks: list[list[str]] = [[additions[0][1]]]
    for (prev_no, _), (line_no, text) in zip(additions, additions[1:]):
        if line_no == prev_no + 1:
            blocks[-1].append(text)
        else:
            blocks.append([text])
    return blocks


def should_upload_partial(added_count: int, total_lines: int, block_count: int) -> bool:
    if added_count == 0 or total_lines == 0:
        return False
    if block_count > 3:
        return False
    return added_count < (total_lines / 2)


def format_partial_content(blocks: list[list[str]]) -> str:
    return "\n\n".join("\n".join(block) for block in blocks)


@dataclass
class UploadPlan:
    mode: Literal["full", "partial"]
    crowdin_name: str
    content: bytes
    added_line_count: int
    total_line_count: int
    block_count: int


def plan_upload(relative_path: str, base_sha: str, head_sha: str) -> UploadPlan:
    file_path = Path(relative_path)
    file_name = crowdin_basename(relative_path)
    total_lines = len(file_path.read_text(encoding="utf-8").splitlines())
    diff_text = git_diff(base_sha, head_sha, relative_path)
    additions = parse_added_lines(diff_text)
    blocks = group_consecutive_blocks(additions)
    added_count = len(additions)

    if should_upload_partial(added_count, total_lines, len(blocks)):
        partial_name = partial_crowdin_name(file_name)
        partial_text = format_partial_content(blocks)
        return UploadPlan(
            mode="partial",
            crowdin_name=partial_name,
            content=partial_text.encode("utf-8"),
            added_line_count=added_count,
            total_line_count=total_lines,
            block_count=len(blocks),
        )

    return UploadPlan(
        mode="full",
        crowdin_name=file_name,
        content=file_path.read_bytes(),
        added_line_count=added_count,
        total_line_count=total_lines,
        block_count=len(blocks),
    )


def write_github_output(name: str, value: str) -> None:
    output_path = env("GITHUB_OUTPUT")
    if not output_path:
        return
    delimiter = f"EOF_{name}"
    with open(output_path, "a", encoding="utf-8") as handle:
        handle.write(f"{name}<<{delimiter}\n{value}\n{delimiter}\n")


def write_skip_outputs() -> None:
    write_github_output("total_words", "0")
    write_github_output("en_editor_links", "")
    write_github_output("es_editor_links", "")
    write_github_output("files_json", "[]")


def main() -> int:
    project_id = env("LOC_CROWDIN_PROJECT_ID")
    if not project_id:
        print("LOC_CROWDIN_PROJECT_ID is not set; skipping Crowdin upload", file=sys.stderr)
        result = {
            "skipped": True,
            "total_words": 0,
            "en_editor_links": "",
            "es_editor_links": "",
            "files": [],
        }
        print(json.dumps(result))
        write_skip_outputs()
        return 0

    base_sha = env("BASE_SHA")
    head_sha = env("HEAD_SHA")
    if not base_sha or not head_sha:
        raise RuntimeError("BASE_SHA and HEAD_SHA are required")

    task_key = env("JIRA_TASK_KEY")
    if not task_key:
        raise RuntimeError("JIRA_TASK_KEY is required")

    en_language = env("CROWDIN_EN_LANGUAGE")
    es_language = env("CROWDIN_ES_LANGUAGE")

    files = changed_files()
    if not files:
        result = {
            "skipped": False,
            "total_words": 0,
            "en_editor_links": "",
            "es_editor_links": "",
            "files": [],
        }
        print(json.dumps(result))
        write_skip_outputs()
        return 0

    branch_id = default_branch_id(project_id)
    uploaded_files = []
    total_words = 0
    en_links: list[str] = []
    es_links: list[str] = []

    for relative_path in files:
        file_path = Path(relative_path)
        if not file_path.is_file():
            print(f"Skipping missing file: {relative_path}", file=sys.stderr)
            continue

        plan = plan_upload(relative_path, base_sha, head_sha)
        crowdin_name = prefixed_crowdin_name(task_key, plan.crowdin_name)
        storage_id = upload_storage_bytes(plan.content, crowdin_name)
        file_id = create_or_update_file(
            project_id, branch_id, storage_id, crowdin_name, "md"
        )
        words = get_file_word_count(project_id, file_id)
        total_words += words

        en_url = editor_url(project_id, file_id, en_language)
        es_url = editor_url(project_id, file_id, es_language)
        en_links.append(f"[{crowdin_name}|{en_url}]")
        es_links.append(f"[{crowdin_name}|{es_url}]")

        uploaded_files.append(
            {
                "source_path": relative_path,
                "path": crowdin_name,
                "upload_mode": plan.mode,
                "file_id": file_id,
                "words": words,
                "added_lines": plan.added_line_count,
                "total_lines": plan.total_line_count,
                "addition_blocks": plan.block_count,
                "en_editor_url": en_url,
                "es_editor_url": es_url,
            }
        )
        print(
            f"Uploaded {crowdin_name} ({plan.mode}): "
            f"{words} words "
            f"({plan.added_line_count}/{plan.total_line_count} added lines, "
            f"{plan.block_count} block(s))",
            file=sys.stderr,
        )

    en_editor_links = "\n".join(en_links)
    es_editor_links = "\n".join(es_links)
    result = {
        "skipped": False,
        "total_words": total_words,
        "en_editor_links": en_editor_links,
        "es_editor_links": es_editor_links,
        "files": uploaded_files,
    }
    print(json.dumps(result))
    write_github_output("total_words", str(total_words))
    write_github_output("en_editor_links", en_editor_links)
    write_github_output("es_editor_links", es_editor_links)
    write_github_output("files_json", json.dumps(uploaded_files))
    return 0


try:
    raise SystemExit(main())
except Exception as error:
    print(f"Crowdin upload failed: {error}", file=sys.stderr)
    raise SystemExit(1) from error
