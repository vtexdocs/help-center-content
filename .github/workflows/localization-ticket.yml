            blocked_index="${pair##*:}"
            create_block_link \
              "${ORDERED_KEYS[$blocker_index]}" \
              "${ORDERED_KEYS[$blocked_index]}"
          done

          for i in "${!SUBTASK_SUMMARIES[@]}"; do
            case "${SUBTASK_SUMMARIES[$i]}" in
              English*)
                if [ -n "${CROWDIN_EN_EDITOR_LINKS:-}" ]; then
                  update_subtask_crowdin_links "${ORDERED_KEYS[$i]}" "$CROWDIN_EN_EDITOR_LINKS"
                fi
                ;;
              Spanish*)
                if [ -n "${CROWDIN_ES_EDITOR_LINKS:-}" ]; then
                  update_subtask_crowdin_links "${ORDERED_KEYS[$i]}" "$CROWDIN_ES_EDITOR_LINKS"
                fi
                ;;
            esac
          done
