name: Validate payment providers data

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'public/payment-providers.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate payment-providers.json
        run: node docs-utils/validatePaymentProviders.mjs
